services:
  - type: web
    name: ecorwanda-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: EcoRwanda Conservation Portal
      - key: DEFAULT_ADMIN_EMAIL
        value: info.teletech.rw@gmail.com
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false

