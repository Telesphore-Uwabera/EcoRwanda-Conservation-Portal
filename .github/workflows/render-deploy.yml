# Optional: triggers a new Render deploy when you push to main.
# Render also auto-deploys if the service is connected to this GitHub repo.
#
# To use this workflow, add a GitHub Actions secret:
#   RENDER_DEPLOY_HOOK_URL = your deploy hook URL from Render
#   (Render dashboard → your Web Service → Settings → Deploy Hook → Create hook)

name: Trigger Render deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not set — skipping (Render Git auto-deploy may still run)."
            exit 0
          fi
          curl -fsS -X POST "$HOOK_URL"
